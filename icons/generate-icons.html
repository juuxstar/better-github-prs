<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas and "Save image as..." to save the icons.</p>
<div id="canvases"></div>
<script>
const sizes = [16, 48, 128];
const container = document.getElementById('canvases');

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background circle
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2;

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#238636';
  ctx.fill();

  // PR icon (simplified)
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = size * 0.08;
  ctx.lineCap = 'round';

  const s = size / 16; // scale factor

  // Left vertical line
  ctx.beginPath();
  ctx.moveTo(5 * s, 4 * s);
  ctx.lineTo(5 * s, 12 * s);
  ctx.stroke();

  // Top-left circle
  ctx.beginPath();
  ctx.arc(5 * s, 3.5 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.fill();

  // Bottom-left circle
  ctx.beginPath();
  ctx.arc(5 * s, 12.5 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.fill();

  // Right vertical line
  ctx.beginPath();
  ctx.moveTo(11 * s, 6 * s);
  ctx.lineTo(11 * s, 12 * s);
  ctx.stroke();

  // Bottom-right circle
  ctx.beginPath();
  ctx.arc(11 * s, 12.5 * s, 1.5 * s, 0, Math.PI * 2);
  ctx.fill();

  // Arrow
  ctx.beginPath();
  ctx.moveTo(8 * s, 3 * s);
  ctx.lineTo(11 * s, 5.5 * s);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(8 * s, 6 * s);
  ctx.lineTo(11 * s, 5.5 * s);
  ctx.stroke();

  const label = document.createElement('div');
  label.innerHTML = `<p>icon${size}.png (${size}x${size})</p>`;
  label.appendChild(canvas);

  // Auto-download link
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download icon${size}.png`;
  label.appendChild(document.createElement('br'));
  label.appendChild(link);

  container.appendChild(label);
});
</script>
</body>
</html>
